exec-once = hyprctl setcursor catppuccin-mocha-blue 16

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

exec-once=waybar
exec-once = bash -c 'playerctl metadata --player=spotify --follow | while read -r _; do pkill -RTMIN+10 waybar; done &' # read for song changes to update cover art on waybar

exec-once = hyprctl dispatch exec "[workspace 1 silent] qutebrowser"
exec-once = ~/.scripts/discord-startup-handler
exec-once=spotify-launcher

exec-once = hyprsunset
exec-once = systemctl --user start hyprpolkitagent

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# make screen share selector inherit system theme
exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user import-environment QT_QPA_PLATFORMTHEME

exec-once=hyprpaper

exec-once=swayosd-server
exec-once=discover-overlay

exec-once=darkman run

exec-once=udiskie


